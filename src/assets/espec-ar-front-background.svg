    <path d="M96 615h770v16H96z" fill="#2a3138"/>
    <circle cx="174" cy="638" r="17" fill="#1c2228"/>
    <circle cx="174" cy="638" r="7" fill="#6f7a76"/>
    <circle cx="792" cy="638" r="17" fill="#1c2228"/>
    <circle cx="792" cy="638" r="7" fill="#6f7a76"/>
  </g>
</svg>
