<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Open environmental chamber front schematic</title>
  <desc id="desc">A clean open-front environmental chamber illustration with a large interior shelf space reserved for an overlaid reservation selection grid.</desc>
  <!--
    ChamberReserve overlay target for the 4 x 3 selection frame:
    x=280 y=126 width=540 height=405
    This SVG intentionally does not draw reservation grid lines.
  -->
  <defs>
    <linearGradient id="outerBody" x1="84" x2="892" y1="50" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfcfb"/>
      <stop offset="0.33" stop-color="#d7dfdc"/>
      <stop offset="0.72" stop-color="#f5f6f4"/>
      <stop offset="1" stop-color="#b3bdb9"/>
    </linearGradient>
    <linearGradient id="controlPanel" x1="102" x2="204" y1="70" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#343b42"/>
      <stop offset="1" stop-color="#20262c"/>
    </linearGradient>
    <linearGradient id="screen" x1="134" x2="178" y1="205" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cd7ff"/>
      <stop offset="0.45" stop-color="#2d78ab"/>
      <stop offset="1" stop-color="#11283a"/>
    </linearGradient>
    <linearGradient id="bezel" x1="230" x2="880" y1="72" y2="578" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2f5f3"/>
      <stop offset="0.45" stop-color="#c6d0cc"/>
      <stop offset="1" stop-color="#eef1ef"/>
    </linearGradient>
    <linearGradient id="cavityBack" x1="280" x2="848" y1="116" y2="542" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f9fdfb"/>
      <stop offset="0.56" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#d9e4e0"/>
    </linearGradient>
    <linearGradient id="leftWall" x1="236" x2="300" y1="104" y2="550" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef4f1"/>
      <stop offset="1" stop-color="#c7d3cf"/>
    </linearGradient>
    <linearGradient id="shelfTop" x1="280" x2="848" y1="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c7d2ce"/>
      <stop offset="0.28" stop-color="#f8fbfa"/>
      <stop offset="0.72" stop-color="#eef4f2"/>
      <stop offset="1" stop-color="#bdc9c5"/>
    </linearGradient>
    <linearGradient id="base" x1="96" x2="884" y1="526" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8dfdc"/>
      <stop offset="0.48" stop-color="#cbd4d0"/>
      <stop offset="1" stop-color="#e4e8e5"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2933" flood-opacity="0.22"/>
    </filter>
    <pattern id="brushedMetal" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M1 0v8M5 0v8" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
      <path d="M3 0v8M7 0v8" stroke="#7f8a86" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="shelfPerforation" width="18" height="8" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="4" r="1.2" fill="#8d9b96" opacity="0.28"/>
      <circle cx="14" cy="4" r="1.2" fill="#8d9b96" opacity="0.2"/>
    </pattern>
  </defs>

  <rect width="960" height="720" fill="#eef1ef"/>
  <ellipse cx="493" cy="650" rx="365" ry="34" fill="#1f2933" opacity="0.13"/>

