    <path d="M280 116h540M280 542h540M280 116v426M820 116v426" stroke="#f8fbfa" stroke-width="2" opacity="0.72"/>

    <g opacity="0.56">
      <path d="M296 253h500c6 0 11 5 11 11v4H288v-4c0-6 5-11 11-11Z" fill="url(#shelfTop)"/>
      <rect x="288" y="268" width="519" height="5" fill="#a9b6b2"/>
