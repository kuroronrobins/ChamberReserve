    <path d="M226 82c0-13 10-23 23-23h587v501H249c-13 0-23-10-23-23V82Z" fill="url(#brushedMetal)" opacity="0.55"/>
    <path d="M226 82c0-13 10-23 23-23h587v501H249c-13 0-23-10-23-23V82Z" fill="none" stroke="#a1aca8" stroke-width="2"/>

