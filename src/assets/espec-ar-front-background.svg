    <path d="M314 129v394M786 129v394" stroke="#dfe8e5" stroke-width="2" opacity="0.38"/>
    <path d="M286 528h528" stroke="#ffffff" stroke-width="2" opacity="0.52"/>

    <path d="M96 560h770v30c0 14-11 25-25 25H121c-14 0-25-11-25-25v-30Z" fill="url(#base)"/>
    <path d="M216 560v54M488 560v54M674 560v54" stroke="#a5b0ac" stroke-width="2"/>
    <rect x="739" y="571" width="28" height="28" rx="4" fill="#7b8783"/>
    <rect x="747" y="577" width="12" height="16" rx="3" fill="#d7dedb"/>
